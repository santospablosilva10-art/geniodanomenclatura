<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organo Rush</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e1b4b, #7e22ce);
  color: white;
  text-align: center;
}

/* CAPA */
#cover {
  height: 100vh;
  background: url("capa.jpg") no-repeat center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
}

#startBtn {
  padding: 18px 35px;
  font-size: 22px;
  border: none;
  border-radius: 15px;
  cursor: pointer;
  background: linear-gradient(135deg, #f97316, #ea580c);
  color: white;
}

/* JOGO */
#game {
  display: none;
  padding: 20px;
}

.card {
  background: rgba(30, 41, 59, 0.95);
  padding: 20px;
  border-radius: 20px;
  max-width: 650px;
  margin: auto;
}

button {
  width: 90%;
  margin: 8px auto;
  padding: 14px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-size: 16px;
  background: linear-gradient(135deg, #4f46e5, #a21caf);
  color: white;
}

button:disabled {
  opacity: 0.5;
}

/* DICAS */
#hintsBox {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 15px;
}

#hintsBox button {
  width: auto;
  padding: 10px 12px;
  font-size: 13px;
}

/* MARCA D'ÁGUA */
#watermark {
  position: fixed;
  bottom: 8px;
  right: 12px;
  font-size: 11px;
  opacity: 0.4;
}

#hidden7 {
  cursor: pointer;
}

#nextBtn { display:none; }

</style>
</head>

<body>

<!-- CAPA -->
<div id="cover">
  <button id="startBtn" onclick="startGame()">🔥 COMEÇAR</button>
</div>

<!-- JOGO -->
<div id="game">
<div class="card">

<h1>🧠 Organo Rush</h1>

<div id="progress"></div>
<h2 id="question"></h2>

<div id="answers"></div>

<div id="hintsBox">
  <button id="btn1" onclick="removeOne()">❌ 1</button>
  <button id="btn2" onclick="removeTwo()">💥 2</button>
  <button id="btn3" onclick="showHint()">💡</button>
</div>

<p id="result"></p>
<button id="nextBtn" onclick="nextQuestion()">Continuar</button>

</div>
</div>

<!-- MARCA D'ÁGUA -->
<div id="watermark">
  Criado em 
  <span id="hidden7" onclick="secretSeven()">7</span> 
  abril 2026
</div>

<script>

// iniciar jogo
function startGame(){
  document.getElementById("cover").style.display = "none";
  document.getElementById("game").style.display = "block";
  loadQuestion();
}

// QUIZ HARD
const quiz = [

{
  question:"Quantos elétrons na camada de valência tem o Iodo?",
  answers:["1","2","3","4"],
  correct:"7",
  special:true,
  hint:"Grupo 17 😉"
},

{question:"Qual o nome IUPAC de CH3-CH(CH3)-CH2-CH3?",answers:["2-metilbutano","3-metilbutano","isopentano","pentano"],correct:"2-metilbutano",hint:"ramificação mais próxima da extremidade"},

{question:"CH3-CH2-CHO pertence a qual função?",answers:["Álcool","Aldeído","Cetona","Éster"],correct:"Aldeído",hint:"termina em -CHO"},

{question:"Qual a fórmula molecular do eteno?",answers:["C2H6","C2H4","C2H2","C3H6"],correct:"C2H4",hint:"dupla ligação perde H"},

{question:"Quantas ligações sigma existem em CH≡CH?",answers:["3","2","4","5"],correct:"3",hint:"tripla = 1 sigma + 2 pi"},

{question:"CH3-CO-CH3 é:",answers:["Propanal","Propanona","Etanol","Ácido"],correct:"Propanona",hint:"carbonila no meio"},

{question:"Qual apresenta isomeria de função?",answers:["Álcool e éter","Alcano e alceno","Alcino e alcano","Ácido e álcool"],correct:"Álcool e éter",hint:"mesma fórmula, funções diferentes"},

{question:"CH3-CH2-CH2-OH é:",answers:["Álcool primário","Secundário","Terciário","Fenol"],correct:"Álcool primário",hint:"OH na ponta"},

{question:"CH3-CH=CH-CH3 é:",answers:["1-buteno","2-buteno","butano","butino"],correct:"2-buteno",hint:"dupla no meio"},

{question:"-COOH representa:",answers:["Álcool","Éster","Ácido carboxílico","Aldeído"],correct:"Ácido carboxílico",hint:"ácido clássico"},

{question:"Quantos carbonos terciários existem em CH3-CH(CH3)-CH(CH3)-CH3?",answers:["1","2","3","0"],correct:"2",hint:"ligado a 3 carbonos"},

{question:"CH3-O-CH3 é:",answers:["Álcool","Éter","Éster","Cetona"],correct:"Éter",hint:"O entre carbonos"},

{question:"CH≡C-CH2-CH3 é:",answers:["1-butino","2-butino","buteno","propino"],correct:"1-butino",hint:"posição da tripla"},

{question:"Qual é hidrocarboneto?",answers:["CH4","CH3OH","CO2","H2O"],correct:"CH4",hint:"só C e H"},

{question:"CH3-CH2-CH2-CH3 é cadeia:",answers:["Aberta saturada normal","Fechada","Insaturada","Aromática"],correct:"Aberta saturada normal",hint:"sem dupla"},

{question:"Qual NÃO é função orgânica?",answers:["Álcool","Cetona","Oxigênio","Éster"],correct:"Oxigênio",hint:"elemento"},

{question:"Qual tem mais hidrogênios?",answers:["C2H6","C2H4","C2H2","C3H6"],correct:"C2H6",hint:"alcano"},

{question:"Ligação dupla possui:",answers:["1 sigma + 1 pi","2 sigma","1 pi","3 sigma"],correct:"1 sigma + 1 pi",hint:"padrão"},

{question:"Ligação tripla possui:",answers:["1 sigma + 2 pi","2 sigma","3 sigma","1 pi"],correct:"1 sigma + 2 pi",hint:"tripla"},

{question:"Qual é saturado?",answers:["CH4","C2H4","C2H2","C3H4"],correct:"CH4",hint:"sem múltiplas"}

];

let current = 0;
let score = 0;

let removeOneCount = 2;
let removeTwoCount = 2;
let hintCount = 2;

let usedHintThisQuestion = false;

function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

function loadQuestion(){
  usedHintThisQuestion = false;

  document.getElementById("result").innerText="";
  document.getElementById("nextBtn").style.display="none";

  enableHints();

  const q = quiz[current];

  document.getElementById("question").innerText = q.question;
  document.getElementById("progress").innerText = `Questão ${current+1}/${quiz.length}`;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML="";

  shuffle([...q.answers]).forEach(answer=>{
    const btn = document.createElement("button");
    btn.innerText = answer;
    btn.onclick = () => checkAnswer(answer);
    answersDiv.appendChild(btn);
  });
}

function enableHints(){
  btn1.disabled = false;
  btn2.disabled = false;
  btn3.disabled = false;
}

function disableHints(){
  btn1.disabled = true;
  btn2.disabled = true;
  btn3.disabled = true;
}

function disableAnswers(){
  document.querySelectorAll("#answers button").forEach(b=>b.disabled=true);
}

function checkAnswer(answer){
  const q = quiz[current];

  if(answer === q.correct){
    score++;
    result.innerText="🧠 GENIAL";
    nextBtn.style.display="block";
    disableAnswers();
  } else {
    if(q.special) return;

    game.innerHTML=`
      <h1>💀 FIM</h1>
      <p>${score}/${quiz.length}</p>
      <button onclick="location.reload()">Recomeçar</button>
    `;
  }
}

function nextQuestion(){
  current++;
  if(current < quiz.length){
    loadQuestion();
  } else {
    game.innerHTML=`
      <h1>🏆 IMPOSSÍVEL!</h1>
      <p>${score}/${quiz.length}</p>
      <button onclick="location.reload()">Jogar novamente</button>
    `;
  }
}

// segredo 7
function secretSeven(){
  const q = quiz[current];

  if(q.correct === "7"){
    score++;
    result.innerText=" SEGREDO ATIVADO";
    nextBtn.style.display="block";
    disableAnswers();
  } else {
    result.innerText="👀 Não agora...";
  }
}

// dicas

function removeOne(){
  if(removeOneCount <= 0 || usedHintThisQuestion) return;

  const q = quiz[current];
  const btns = [...document.querySelectorAll("#answers button")];
  const wrongs = btns.filter(b => b.innerText !== q.correct);

  const random = wrongs[Math.floor(Math.random()*wrongs.length)];
  if(random) random.style.display="none";

  removeOneCount--;
  usedHintThisQuestion = true;
  disableHints();
}

function removeTwo(){
  if(removeTwoCount <= 0 || usedHintThisQuestion) return;

  const q = quiz[current];
  const btns = [...document.querySelectorAll("#answers button")];
  const wrongs = btns.filter(b => b.innerText !== q.correct);

  shuffle(wrongs).slice(0,2).forEach(b=>b.style.display="none");

  removeTwoCount--;
  usedHintThisQuestion = true;
  disableHints();
}

function showHint(){
  if(hintCount <= 0 || usedHintThisQuestion) return;

  result.innerText = "💡 " + quiz[current].hint;

  hintCount--;
  usedHintThisQuestion = true;
  disableHints();
}

</script>

</body>
</html>
